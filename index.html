<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cafe Time Tracker</title>

    <!-- Ngăn chặn trình duyệt cache file HTML -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <script>
      // Cơ chế kiểm tra phiên bản (Versioning)
      // Thay đổi giá trị APP_VERSION mỗi khi bạn có bản cập nhật code mới
      const APP_VERSION = "1.0.1"; 
      const currentVersion = localStorage.getItem('appVersion');
      
      if (currentVersion !== APP_VERSION) {
        console.log("Phát hiện phiên bản mới (" + APP_VERSION + "), đang tải lại trang...");
        localStorage.setItem('appVersion', APP_VERSION);
        
        // Xóa bộ nhớ đệm (Cache Storage) để đảm bảo tải file JS/CSS mới nhất
        if ('caches' in window) {
          caches.keys().then((names) => {
            names.forEach(name => caches.delete(name));
          });
        }
        
        // Tải lại trang ngay lập tức
        window.location.reload();
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
